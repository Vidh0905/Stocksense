version: '3.8'

services:
  mongo:
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db

  redis:
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/stocksense
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=stocksense_secret_key
      - ML_SERVICE_URL=http://ml-service:8000
      - ALPHA_VANTAGE_KEY=demo
      - NEWS_API_KEY=demo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000/api/v1